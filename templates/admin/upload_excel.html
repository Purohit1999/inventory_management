{% extends "admin/change_list.html" %}

{% block content %}
    <h2>Upload Excel File</h2>
    <form action="{% url 'admin:upload_excel' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="excel_file" required>
        <button type="submit">Upload</button>
    </form>
    {{ block.super }}
{% endblock %}
